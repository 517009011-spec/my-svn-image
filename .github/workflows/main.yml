name: 打包SVN镜像
on: [workflow_dispatch] # 允许手动点击开始
jobs:
  download-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取镜像
        run: |
          # 尝试拉取目前最活跃、权限最开放的 SVN Edge 镜像
          docker pull all-in-one/csvn:latest
      - name: 打包镜像
        run: |
          # 将其保存为 tar 文件
          docker save all-in-one/csvn:latest > csvn_image.tar
      - name: 上传文件供下载
        uses: actions/upload-artifact@v4
        with:
          name: csvn-package # 这是您下载时压缩包的名字
          path: csvn_image.tar
          retention-days: 1 # 文件保留1天
